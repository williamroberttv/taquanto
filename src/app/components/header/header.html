<header class="sticky top-0 z-20 border-b border-[#e0e0e5] bg-white/88 backdrop-blur-md">
  <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-5 py-3">
    <a
      href="#topo"
      class="inline-flex min-h-11 items-center gap-3 rounded-md focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#6c47ff]"
      aria-label="TaQuanto, voltar ao início"
    >
      <span class="flex h-9 w-9 items-center justify-center rounded-md bg-[#6c47ff] font-semibold text-white">TQ</span>
      <span class="font-semibold text-[#131316]">TaQuanto</span>
    </a>

    <nav class="hidden sm:block" aria-label="Navegação principal">
      <ul class="flex items-center gap-1">
        @for (item of navigation; track item.href) {
          <li>
            <a
              [href]="item.href"
              class="inline-flex min-h-11 items-center rounded-md px-3 text-sm font-medium text-[#747686] transition hover:bg-[#f7f7f8] hover:text-[#131316] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#6c47ff]"
            >
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>
  </div>
</header>
